<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>VoirAnime — Anime</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="pi-auth.js" defer></script>
  <script src="js/i18n.js"></script>
  <script src="featuresManager.js"></script>
  <script src="premiumManager.js"></script>
</head>

<body class="page-anime">

<div class="page-loader" id="pageLoader">
  <div class="sk-dots large"><span></span><span></span><span></span></div>
</div>

<!-- NAV -->
<nav class="navbar scrolled" id="navbar">
  <div class="nav-top">

    <div class="nav-left">
      <div class="nav-logo-wrap">
        <a href="index.html" class="nav-logo">
          <span class="logo-glitch" data-text="VoirAnime">
            <span class="logo-voir">Voir</span><span class="logo-anime">Anime</span>
          </span>
        </a>
        <span class="logo-tagline" data-i18n="nav.tagline"></span>
      </div>
    </div>

    <a href="profile.html" class="nav-avatar-btn nav-avatar-left" id="navAvatarBtn">
      <img class="nav-avatar-img" id="navAvatarImg"/>
      <div class="nav-avatar-fallback" id="navAvatarFallback_anime">👤</div>
    </a>

  </div>

  <ul class="nav-links">
    <li><a href="index.html" class="nav-link" data-i18n="nav.home">Accueil</a></li>
    <li><a href="catalogue.html" class="nav-link" data-i18n="nav.catalogue">Catalogue</a></li>
    <li><a href="duel.html" class="nav-link" data-i18n="nav.duels">⚔ Duels</a></li>
    <li><a href="news.html" class="nav-link" data-i18n="nav.news">📰 News</a></li>
    <li><a href="soutenir.html" class="nav-link nav-link-support" data-i18n="nav.support">💜 Support</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="anime-hero" id="animeHero">

  <div class="trailer-container" id="trailerContainer">
    <iframe id="trailerFrame" title="Trailer" allowfullscreen></iframe>
  </div>

  <div class="anime-banner" id="animeBanner">
    <img id="bannerImg" alt=""/>
    <div class="banner-vignette"></div>
  </div>

  <div class="trailer-controls">

    <div class="trailer-left">

      <button class="trailer-btn play-btn" id="playTrailerBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        <span data-i18n="anime.trailer"></span>
      </button>

      <button class="trailer-btn unmute-btn hidden" id="unmuteBtn">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <span id="muteLabel" data-i18n="anime.sound_off"></span>
      </button>

    </div>

  </div>

</section>

<div class="hero-bottom-fade"></div>

<!-- CONTENT -->
<main class="anime-content">

  <div class="anime-main-col">

    <div class="anime-header">

      <h1 id="animeTitle">—</h1>

      <div class="watch-status-widget">
        <div class="watch-status-label" data-i18n="anime.my_tracking"></div>
        <div class="watch-status-btns">
          <button class="watch-status-btn">▶ En cours</button>
          <button class="watch-status-btn">✓ Terminé</button>
          <button class="watch-status-btn">🔖 À regarder</button>
        </div>
      </div>

      <div class="rating-widget">
        <div class="rating-label" data-i18n="anime.my_rating"></div>
      </div>

    </div>

    <div class="anime-synopsis-block">
      <h2 data-i18n="anime.synopsis"></h2>

      <div class="synopsis-actions">
        <button data-i18n="anime.read_more"></button>
        <button data-i18n="anime.translate_fr"></button>
      </div>

    </div>

    <div class="anime-genres-block">
      <h2 data-i18n="anime.genres"></h2>
    </div>

  </div>

  <aside class="anime-aside-col">

    <div class="score-widget">
      <div class="score-label" data-i18n="anime.score"></div>
    </div>

    <h3 data-i18n="anime.where"></h3>

  </aside>

</main>

<!-- EXTRA -->
<section class="anime-extra">

  <div class="accordion">
    <button>
      🎙️ <span data-i18n="anime.voices"></span>
    </button>
    <div>
      <div data-i18n="anime.no_info"></div>
    </div>
  </div>

  <div class="accordion">
    <button>
      🎵 <span data-i18n="anime.music"></span>
    </button>
    <div>
      <div data-i18n="anime.no_info"></div>
    </div>
  </div>

</section>

<!-- FOOTER -->
<footer class="site-footer">
  <div>Voir<span>Anime</span></div>
  <p data-i18n="footer.no_video"></p>
</footer>

<script type="module" src="anime.js"></script>

</body>
</html>
