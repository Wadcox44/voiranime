<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>VoirAnime — Anime</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
  <style>
    /* (inchangé volontairement) */
  </style>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="pi-auth.js" defer></script>
  <script src="js/i18n.js"></script>
  <script src="featuresManager.js"></script>
  <script src="premiumManager.js"></script>
</head>

<body class="page-anime">

<!-- NAV -->
<nav class="navbar scrolled" id="navbar">
  <div class="nav-top">
    <div class="nav-left">
      <div class="nav-logo-wrap">
        <a href="index.html" class="nav-logo">
          <span class="logo-glitch" data-text="VoirAnime">
            <span class="logo-voir">Voir</span><span class="logo-anime">Anime</span>
          </span>
        </a>
        <span class="logo-tagline" data-i18n="nav.tagline">Découvre autrement.</span>
      </div>
    </div>

    <a href="profile.html" class="nav-avatar-btn nav-avatar-left" id="navAvatarBtn">
      <img class="nav-avatar-img" id="navAvatarImg" src="" alt="Profil"/>
      <div class="nav-avatar-fallback" id="navAvatarFallback_anime">👤</div>
    </a>
  </div>

  <ul class="nav-links">
    <li><a href="index.html" data-i18n="nav.home">Accueil</a></li>
    <li><a href="catalogue.html" data-i18n="nav.catalogue">Catalogue</a></li>
    <li><a href="duel.html" data-i18n="nav.duels">⚔ Duels</a></li>
    <li><a href="news.html" data-i18n="nav.news">📰 News</a></li>
    <li><a href="soutenir.html" data-i18n="nav.support">💜 Faire un don</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="anime-hero" id="animeHero">

  <div class="trailer-container" id="trailerContainer">
    <iframe id="trailerFrame" src="" title="Bande-annonce"></iframe>
  </div>

  <div class="anime-banner" id="animeBanner">
    <img id="bannerImg" src="" alt=""/>
    <div class="banner-vignette"></div>
  </div>

  <div class="trailer-controls" id="trailerControls">
    <div class="trailer-left">

      <button class="trailer-btn play-btn" id="playTrailerBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        <span data-i18n="anime.trailer">Trailer</span>
      </button>

      <button class="trailer-btn unmute-btn hidden" id="unmuteBtn">
        <span data-i18n="anime.sound_off">Son actif</span>
      </button>

    </div>

    <div class="trailer-rating" id="trailerRating"></div>
  </div>

</section>

<div class="hero-bottom-fade"></div>

<!-- CONTENT -->
<main class="anime-content" id="animeContent">

  <div class="anime-main-col">

    <div class="anime-header">

      <div class="anime-badges" id="animeBadges"></div>

      <div class="anime-title-row">
        <h1 class="anime-title" id="animeTitle">—</h1>
      </div>

      <div class="anime-quick-stats" id="animeQuickStats"></div>

      <div class="watch-status-widget">
        <div class="watch-status-label" data-i18n="anime.my_tracking">Mon suivi</div>
      </div>

      <div class="rating-widget">
        <div class="rating-label" data-i18n="anime.my_rating">Ma note</div>
      </div>

    </div>

    <div class="anime-synopsis-block">
      <h2 class="block-title" data-i18n="anime.synopsis">Synopsis</h2>
      <button data-i18n="anime.read_more">Lire plus ▼</button>
    </div>

    <div class="anime-genres-block">
      <h2 class="block-title" data-i18n="anime.genres">Genres &amp; Thèmes</h2>
    </div>

  </div>

  <aside class="anime-aside-col">

    <div class="score-widget">
      <div data-i18n="anime.score">Score MAL</div>
    </div>

    <div class="streaming-block">
      <h3 data-i18n="anime.where">Où regarder</h3>
    </div>

  </aside>

</main>

<!-- EXTRA -->
<section class="anime-extra" style="display:none">

  <div class="accordion">
    <button class="accordion-header">
      <span data-i18n="anime.voices">Voix des personnages</span>
    </button>
    <div>
      <div data-i18n="anime.no_info">Aucune information disponible</div>
    </div>
  </div>

  <div class="accordion">
    <button class="accordion-header">
      <span data-i18n="anime.music">Musiques</span>
    </button>
    <div>
      <div data-i18n="anime.no_info">Aucune information disponible</div>
    </div>
  </div>

</section>

</body>
</html>
