<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VOIRANIME</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
</head>
<body class="page-anime">

<!-- ═══════════════════════════════════════════
     NAVBAR
═══════════════════════════════════════════ -->
<nav class="navbar transparent" id="navbar">
  <div class="nav-left">
    <a href="index.html" class="nav-logo">ANI<span>VAULT</span></a>
    <a href="index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Retour
    </a>
  </div>
  <div class="nav-right">
    <button class="btn-fav nav-fav-btn" id="navFavBtn" data-id="">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Favori
    </button>
  </div>
</nav>

<!-- ═══════════════════════════════════════════
     FULL LOADER
═══════════════════════════════════════════ -->
<div class="page-loader" id="pageLoader">
  <div class="sk-dots large"><span></span><span></span><span></span></div>
</div>

<!-- ═══════════════════════════════════════════
     ANIME HERO (Trailer / Banner)
═══════════════════════════════════════════ -->
<section class="anime-hero" id="animeHero">
  <!-- YouTube iframe (hidden until played) -->
  <div class="trailer-container" id="trailerContainer">
    <iframe
      id="trailerFrame"
      src=""
      title="Trailer"
      frameborder="0"
      allow="autoplay; encrypted-media"
      allowfullscreen
    ></iframe>
  </div>

  <!-- Fallback: banner image -->
  <div class="anime-banner" id="animeBanner">
    <img id="bannerImg" src="" alt=""/>
    <div class="banner-vignette"></div>
  </div>

  <!-- Controls overlay -->
  <div class="trailer-controls" id="trailerControls">
    <div class="trailer-left">
      <button class="trailer-btn play-btn" id="playTrailerBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        Voir la bande-annonce
      </button>
      <button class="trailer-btn unmute-btn hidden" id="unmuteBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="muteIcon"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        <span id="muteLabel">Son actif</span>
      </button>
    </div>
    <div class="trailer-rating" id="trailerRating"></div>
  </div>

  <!-- Bottom gradient for content below -->
  <div class="hero-bottom-fade"></div>
</section>

<!-- ═══════════════════════════════════════════
     ANIME CONTENT
═══════════════════════════════════════════ -->
<main class="anime-content" id="animeContent">

  <!-- Left column: details -->
  <div class="anime-main-col">
    <div class="anime-header">
      <div class="anime-badges" id="animeBadges"></div>
      <h1 class="anime-title" id="animeTitle">—</h1>
      <p class="anime-title-jp" id="animeTitleJp"></p>

      <div class="anime-quick-stats" id="animeQuickStats">
        <!-- Score, year, episodes, duration -->
      </div>

      <div class="anime-action-row">
        <a href="#" class="btn-primary watch-crunchy" id="watchCrunchyBtn" target="_blank">
          <img src="https://www.crunchyroll.com/favicons/favicon-32x32.png" width="16" height="16" onerror="this.style.display='none'" alt=""/>
          Crunchyroll
        </a>
        <a href="#" class="btn-primary watch-netflix" id="watchNetflixBtn" target="_blank">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l4.5 9L5 21h3l2.25-4.5L12.75 21h3L11.25 12 15.75 3h-3L10.5 7.5 8.25 3H5z"/></svg>
          Netflix
        </a>
        <button class="btn-secondary" id="animeFavBtn" data-id="">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span id="favBtnLabel">Favori</span>
        </button>
      </div>
    </div>

    <div class="anime-synopsis-block">
      <h2 class="block-title">Synopsis</h2>
      <p class="anime-synopsis" id="animeSynopsis"></p>
      <button class="synopsis-toggle" id="synopsisToggle">Lire plus ▼</button>
    </div>

    <div class="anime-genres-block">
      <h2 class="block-title">Genres & Thèmes</h2>
      <div class="tags-list" id="animeGenres"></div>
    </div>

    <!-- Skeleton for loading -->
    <div class="detail-skeleton" id="detailSkeleton">
      <div class="sk-block sk-title-lg"></div>
      <div class="sk-block sk-text"></div>
      <div class="sk-block sk-text short"></div>
      <div class="sk-block sk-text"></div>
    </div>
  </div>

  <!-- Right column: metadata -->
  <aside class="anime-aside-col" id="animeAside">
    <div class="score-widget" id="scoreWidget">
      <div class="score-circle">
        <div class="score-value" id="scoreValue">—</div>
        <div class="score-max">/10</div>
      </div>
      <div class="score-info">
        <div class="score-label">Score MAL</div>
        <div class="score-voters" id="scoreVoters"></div>
        <div class="score-rank" id="scoreRank"></div>
      </div>
    </div>

    <div class="info-table" id="infoTable">
      <!-- Populated by JS -->
    </div>

    <div class="streaming-block">
      <h3 class="block-title small">Où regarder</h3>
      <div class="stream-links">
        <a href="#" id="streamCrunchyroll" class="stream-link crunchyroll-link" target="_blank">
          <span class="stream-icon">🟠</span> Crunchyroll
        </a>
        <a href="#" id="streamNetflix" class="stream-link netflix-link" target="_blank">
          <span class="stream-icon">🔴</span> Netflix
        </a>
        <a href="#" id="streamADN" class="stream-link adn-link" target="_blank">
          <span class="stream-icon">🔵</span> ADN
        </a>
      </div>
    </div>
  </aside>
</main>

<!-- ═══════════════════════════════════════════
     RECOMMENDATIONS
═══════════════════════════════════════════ -->
<section class="recommendations-section" id="recommendationsSection">
  <div class="content-section">
    <div class="section-header">
      <h2 class="section-title"><span class="section-dot orange"></span>Animes similaires</h2>
    </div>
    <div class="carousel-wrapper">
      <button class="carousel-btn prev" data-carousel="reco">‹</button>
      <div class="carousel" id="carousel-reco"></div>
      <button class="carousel-btn next" data-carousel="reco">›</button>
    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════════
     FOOTER
═══════════════════════════════════════════ -->
<footer class="site-footer">
  <div class="footer-logo">ANI<span>VAULT</span></div>
  <p class="footer-text">Données fournies par <a href="https://jikan.moe" target="_blank">Jikan API</a> · MyAnimeList</p>
</footer>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module" src="anime.js">
</script>
</body>
</html>
