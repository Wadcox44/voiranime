<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoirAnime — Contact</title>
  <meta name="description" content="Formulaire de contact VoirAnime — signaler un bug, proposer une suggestion ou une collaboration." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════
       CONTACT MODAL — VoirAnime
       Dark / Glassmorphism / Premium
       ═══════════════════════════════════════════ */

    /* ── RESET & BASE ───────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* palette */
      --va-bg:            #0b0d14;
      --va-surface:       rgba(18, 22, 36, .72);
      --va-surface-solid: #121624;
      --va-border:        rgba(255, 255, 255, .08);
      --va-border-focus:  rgba(124, 92, 252, .55);
      --va-text:          #e8eaf0;
      --va-text-muted:    #8b90a0;
      --va-accent:        #7c5cfc;
      --va-accent-glow:   rgba(124, 92, 252, .35);
      --va-accent-hover:  #9478ff;
      --va-success:       #34d399;
      --va-danger:        #f87171;
      --va-radius:        12px;
      --va-radius-sm:     8px;
      --va-font:          'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --va-transition:    .22s cubic-bezier(.4,0,.2,1);
    }

    body {
      font-family: var(--va-font);
      background: var(--va-bg);
      color: var(--va-text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── DEMO TRIGGER (remove in production) ── */
    .demo-trigger-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .demo-open-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      font-family: var(--va-font);
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--va-accent), #a78bfa);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform var(--va-transition), box-shadow var(--va-transition);
      box-shadow: 0 4px 24px var(--va-accent-glow);
    }
    .demo-open-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 32px var(--va-accent-glow);
    }
    .demo-open-btn__icon {
      font-size: 18px;
    }

    /* ═══════════════════════════════════════════
       MODAL OVERLAY
       ═══════════════════════════════════════════ */
    .contact-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      /* hidden by default */
      opacity: 0;
      visibility: hidden;
      transition: opacity .3s ease, visibility .3s ease;
    }
    .contact-modal.is-open {
      opacity: 1;
      visibility: visible;
    }

    /* backdrop */
    .contact-modal__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, .65);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    /* ═══════════════════════════════════════════
       CARD — glassmorphism
       ═══════════════════════════════════════════ */
    .contact-modal__card {
      position: relative;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      background: var(--va-surface);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid var(--va-border);
      border-radius: 20px;
      padding: 36px 32px 32px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 24px 80px -12px rgba(0, 0, 0, .6),
        0 0 60px -20px var(--va-accent-glow);
      /* entrance animation */
      transform: scale(.92) translateY(16px);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
    }
    .contact-modal.is-open .contact-modal__card {
      transform: scale(1) translateY(0);
    }

    /* scrollbar styling */
    .contact-modal__card::-webkit-scrollbar {
      width: 6px;
    }
    .contact-modal__card::-webkit-scrollbar-track {
      background: transparent;
    }
    .contact-modal__card::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,.12);
      border-radius: 3px;
    }

    /* ── CLOSE BTN ──────────────────────────── */
    .contact-modal__close {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: 1px solid var(--va-border);
      border-radius: 10px;
      background: rgba(255,255,255,.04);
      color: var(--va-text-muted);
      cursor: pointer;
      transition: background var(--va-transition), color var(--va-transition), border-color var(--va-transition);
    }
    .contact-modal__close:hover {
      background: rgba(255,255,255,.08);
      color: #fff;
      border-color: rgba(255,255,255,.15);
    }

    /* ═══════════════════════════════════════════
       HEADER
       ═══════════════════════════════════════════ */
    .contact-modal__header {
      text-align: center;
      margin-bottom: 28px;
    }
    .contact-modal__title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, #fff 30%, var(--va-accent-hover));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .contact-modal__subtitle {
      margin-top: 6px;
      font-size: 13.5px;
      color: var(--va-text-muted);
      font-weight: 400;
    }

    /* ═══════════════════════════════════════════
       FORM LAYOUT
       ═══════════════════════════════════════════ */
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-form__group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .contact-form__row {
      display: flex;
      gap: 16px;
    }
    .contact-form__group--half {
      flex: 1;
      min-width: 0;
    }

    /* ── LABELS ─────────────────────────────── */
    .contact-form__label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--va-text-muted);
      letter-spacing: .03em;
      text-transform: uppercase;
    }
    .contact-form__required {
      color: var(--va-accent);
      margin-left: 2px;
    }
    .contact-form__optional {
      font-weight: 400;
      text-transform: none;
      font-size: 11.5px;
      opacity: .6;
    }

    /* ── INPUT / TEXTAREA / SELECT shared ───── */
    .contact-form__input,
    .contact-form__textarea,
    .contact-form__select {
      width: 100%;
      font-family: var(--va-font);
      font-size: 14px;
      color: var(--va-text);
      background: rgba(255, 255, 255, .04);
      border: 1px solid var(--va-border);
      border-radius: var(--va-radius);
      padding: 12px 14px;
      outline: none;
      transition:
        border-color var(--va-transition),
        box-shadow var(--va-transition),
        background var(--va-transition);
    }
    .contact-form__input::placeholder,
    .contact-form__textarea::placeholder {
      color: rgba(139, 144, 160, .6);
    }

    /* focus highlight */
    .contact-form__input:focus,
    .contact-form__textarea:focus,
    .contact-form__select:focus {
      border-color: var(--va-border-focus);
      background: rgba(124, 92, 252, .06);
      box-shadow: 0 0 0 3px rgba(124, 92, 252, .12), 0 0 20px -4px rgba(124, 92, 252, .15);
    }

    /* ── SELECT WRAPPER ─────────────────────── */
    .contact-form__select-wrapper {
      position: relative;
    }
    .contact-form__select {
      appearance: none;
      -webkit-appearance: none;
      padding-right: 40px;
      cursor: pointer;
    }
    .contact-form__select option {
      background: var(--va-surface-solid);
      color: var(--va-text);
      padding: 8px;
    }
    .contact-form__select-chevron {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--va-text-muted);
      pointer-events: none;
      transition: color var(--va-transition);
    }
    .contact-form__select:focus + .contact-form__select-chevron {
      color: var(--va-accent);
    }

    /* ── TEXTAREA ───────────────────────────── */
    .contact-form__textarea {
      resize: vertical;
      min-height: 120px;
      line-height: 1.6;
    }

    /* ═══════════════════════════════════════════
       SUBMIT BUTTON
       ═══════════════════════════════════════════ */
    .contact-form__submit {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 24px;
      font-family: var(--va-font);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .01em;
      color: #fff;
      background: linear-gradient(135deg, var(--va-accent), #a270f7);
      border: none;
      border-radius: var(--va-radius);
      cursor: pointer;
      overflow: hidden;
      transition:
        transform var(--va-transition),
        box-shadow var(--va-transition),
        filter var(--va-transition);
      box-shadow: 0 4px 20px -4px var(--va-accent-glow);
    }
    .contact-form__submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.15), transparent 60%);
      opacity: 0;
      transition: opacity var(--va-transition);
    }
    .contact-form__submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 32px -4px var(--va-accent-glow), 0 0 20px -2px rgba(124,92,252,.3);
    }
    .contact-form__submit:hover::before {
      opacity: 1;
    }
    .contact-form__submit:active {
      transform: translateY(0) scale(.98);
    }

    /* loading state */
    .contact-form__submit-loader {
      display: none;
    }
    .contact-form__submit.is-loading .contact-form__submit-text {
      opacity: 0;
    }
    .contact-form__submit.is-loading .contact-form__submit-loader {
      display: flex;
      position: absolute;
    }
    .contact-form__submit.is-loading {
      pointer-events: none;
      filter: brightness(.85);
    }

    /* ═══════════════════════════════════════════
       SUCCESS MESSAGE
       ═══════════════════════════════════════════ */
    .contact-form__success {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: rgba(52, 211, 153, .1);
      border: 1px solid rgba(52, 211, 153, .25);
      border-radius: var(--va-radius);
      font-size: 13.5px;
      color: var(--va-success);
      animation: successIn .4s ease;
    }
    .contact-form__success[hidden] {
      display: none;
    }
    .contact-form__success-icon {
      font-size: 18px;
      flex-shrink: 0;
    }

    @keyframes successIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════════════════
       RESPONSIVE — MOBILE
       ═══════════════════════════════════════════ */
    @media (max-width: 600px) {
      .contact-modal {
        padding: 12px;
        align-items: flex-end;
      }
      .contact-modal__card {
        max-height: 92vh;
        padding: 28px 20px 24px;
        border-radius: 18px 18px 12px 12px;
      }
      .contact-form__row {
        flex-direction: column;
        gap: 20px;
      }
      .contact-modal__title {
        font-size: 20px;
      }
      .contact-modal__subtitle {
        font-size: 12.5px;
      }
    }

    @media (max-width: 380px) {
      .contact-modal__card {
        padding: 24px 16px 20px;
      }
    }

    /* ═══════════════════════════════════════════
       VALIDATION VISUAL FEEDBACK
       ═══════════════════════════════════════════ */
    .contact-form__input:invalid:not(:placeholder-shown),
    .contact-form__textarea:invalid:not(:placeholder-shown) {
      border-color: rgba(248, 113, 113, .45);
    }
    .contact-form__input:valid:not(:placeholder-shown),
    .contact-form__textarea:valid:not(:placeholder-shown) {
      border-color: rgba(52, 211, 153, .3);
    }

    /* ═══════════════════════════════════════════
       SUBTLE AMBIENT GLOW BEHIND CARD
       ═══════════════════════════════════════════ */
    .contact-modal__card::after {
      content: '';
      position: absolute;
      top: -40%;
      left: 50%;
      transform: translateX(-50%);
      width: 120%;
      height: 100%;
      background: radial-gradient(ellipse at center, rgba(124, 92, 252, .08) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>
<body>

  <!-- DEMO: bouton pour ouvrir le modal -->
  <div class="demo-trigger-wrapper">
    <button id="openContactBtn" class="demo-open-btn" aria-label="Ouvrir le formulaire de contact">
      <span class="demo-open-btn__icon">✉️</span>
      Nous contacter
    </button>
  </div>

  <!-- ═══════════════════════════════════════════
       MODAL CONTACT — #footerContactModal
  ════════════════════════════════════════════ -->
  <div id="footerContactModal" class="contact-modal" role="dialog" aria-modal="true" aria-labelledby="contactModalTitle">
    <!-- backdrop -->
    <div class="contact-modal__backdrop" data-close-modal></div>

    <!-- card -->
    <div class="contact-modal__card">
      <!-- close button -->
      <button class="contact-modal__close" data-close-modal aria-label="Fermer">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M15 5L5 15M5 5l10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>

      <!-- header -->
      <header class="contact-modal__header">
        <h2 id="contactModalTitle" class="contact-modal__title">Nous contacter</h2>
        <p class="contact-modal__subtitle">Bug, suggestion ou collaboration — on te répond rapidement</p>
      </header>

      <!-- form -->
      <form
        id="contactForm"
        class="contact-form"
        action="https://formspree.io/f/YOUR_FORM_ID"
        method="POST"
      >
        <!-- ── TYPE DE DEMANDE ── -->
        <div class="contact-form__group">
          <label for="contactType" class="contact-form__label">Type de demande <span class="contact-form__required">*</span></label>
          <div class="contact-form__select-wrapper">
            <select id="contactType" name="type" required class="contact-form__select">
              <option value="" disabled selected>Choisis une catégorie…</option>
              <option value="bug">🐞 Bug / erreur</option>
              <option value="suggestion">💡 Suggestion d'amélioration</option>
              <option value="collaboration">🤝 Collaboration / partenariat</option>
              <option value="contenu">🎬 Contenu anime / ajout / correction</option>
              <option value="autre">❓ Autre</option>
            </select>
            <svg class="contact-form__select-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>

        <!-- ── PAGE CONCERNÉE ── -->
        <div class="contact-form__group">
          <label for="contactPage" class="contact-form__label">Page concernée <span class="contact-form__optional">(optionnel)</span></label>
          <div class="contact-form__select-wrapper">
            <select id="contactPage" name="page" class="contact-form__select">
              <option value="" disabled selected>Sélectionne une page…</option>
              <option value="accueil">🏠 Accueil</option>
              <option value="catalogue">📚 Catalogue</option>
              <option value="news">📰 News</option>
              <option value="anime">🎥 Anime</option>
              <option value="profil">👤 Profil</option>
              <option value="global">🌐 Global / site entier</option>
            </select>
            <svg class="contact-form__select-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>

        <!-- ── IDENTITÉ ── -->
        <div class="contact-form__row">
          <div class="contact-form__group contact-form__group--half">
            <label for="contactName" class="contact-form__label">Nom <span class="contact-form__required">*</span></label>
            <input id="contactName" type="text" name="name" required placeholder="Ton pseudo ou nom" class="contact-form__input" autocomplete="name" />
          </div>
          <div class="contact-form__group contact-form__group--half">
            <label for="contactEmail" class="contact-form__label">Email <span class="contact-form__required">*</span></label>
            <input id="contactEmail" type="email" name="email" required placeholder="email@exemple.com" class="contact-form__input" autocomplete="email" />
          </div>
        </div>

        <!-- ── MESSAGE ── -->
        <div class="contact-form__group">
          <label for="contactMessage" class="contact-form__label">Message <span class="contact-form__required">*</span></label>
          <textarea id="contactMessage" name="message" required rows="5" placeholder="Décris ta demande en détail…" class="contact-form__textarea"></textarea>
        </div>

        <!-- ── HIDDEN INPUTS ── -->
        <input type="hidden" id="hiddenLang" name="_lang" />
        <input type="hidden" id="hiddenUrl" name="_pageUrl" />

        <!-- ── SUBMIT ── -->
        <button type="submit" id="contactSubmitBtn" class="contact-form__submit">
          <span class="contact-form__submit-text">Envoyer le message</span>
          <span class="contact-form__submit-loader" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="2.5" fill="none" stroke-dasharray="40 60" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" from="0 10 10" to="360 10 10" dur=".7s" repeatCount="indefinite"/></circle></svg>
          </span>
        </button>

        <!-- success message -->
        <div id="contactSuccess" class="contact-form__success" aria-live="polite" hidden>
          <span class="contact-form__success-icon">✅</span>
          <p>Message envoyé avec succès ! On te répond rapidement.</p>
        </div>
      </form>
    </div>
  </div>

  <script>
    /* ═══════════════════════════════════════════
       CONTACT MODAL — JS (vanilla, zero deps)
       VoirAnime
       ═══════════════════════════════════════════ */

    (function () {
      'use strict';

      // ── DOM refs ──────────────────────────────
      const modal       = document.getElementById('footerContactModal');
      const form        = document.getElementById('contactForm');
      const submitBtn   = document.getElementById('contactSubmitBtn');
      const successMsg  = document.getElementById('contactSuccess');
      const hiddenLang  = document.getElementById('hiddenLang');
      const hiddenUrl   = document.getElementById('hiddenUrl');

      // All elements that should close the modal
      const closeTriggers = modal.querySelectorAll('[data-close-modal]');

      // The demo open button (remove in production if using your own trigger)
      const openBtn = document.getElementById('openContactBtn');

      // ── OPEN ──────────────────────────────────
      function openModal() {
        // Populate hidden fields each time modal opens
        hiddenLang.value = navigator.language || navigator.userLanguage || 'unknown';
        hiddenUrl.value  = window.location.href;

        modal.classList.add('is-open');
        document.body.style.overflow = 'hidden';

        // Focus first interactive element after animation
        setTimeout(function () {
          var firstInput = modal.querySelector('select, input, textarea');
          if (firstInput) firstInput.focus();
        }, 350);
      }

      // ── CLOSE ─────────────────────────────────
      function closeModal() {
        modal.classList.remove('is-open');
        document.body.style.overflow = '';
      }

      // ── EVENT LISTENERS ───────────────────────

      // Open button (demo — adapt to your footer link)
      if (openBtn) {
        openBtn.addEventListener('click', openModal);
      }

      // Close triggers (backdrop + close button)
      closeTriggers.forEach(function (el) {
        el.addEventListener('click', closeModal);
      });

      // Escape key
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && modal.classList.contains('is-open')) {
          closeModal();
        }
      });

      // ── FORM SUBMIT (Formspree via AJAX) ──────
      form.addEventListener('submit', function (e) {
        e.preventDefault();

        // Validate required fields
        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }

        // Loading state
        submitBtn.classList.add('is-loading');

        // Collect form data
        var data = new FormData(form);

        fetch(form.action, {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        })
        .then(function (response) {
          submitBtn.classList.remove('is-loading');

          if (response.ok) {
            // Show success
            form.reset();
            successMsg.hidden = false;
            submitBtn.style.display = 'none';

            // Auto-close after a few seconds
            setTimeout(function () {
              closeModal();
              // Reset success state for next opening
              setTimeout(function () {
                successMsg.hidden = true;
                submitBtn.style.display = '';
              }, 400);
            }, 3000);
          } else {
            alert('Une erreur est survenue. Réessaie dans quelques instants.');
          }
        })
        .catch(function () {
          submitBtn.classList.remove('is-loading');
          alert('Impossible d\'envoyer le message. Vérifie ta connexion.');
        });
      });

      // ── PUBLIC API (optional) ─────────────────
      // Expose open/close so other scripts can call them:
      //   window.VoirAnimeContact.open()
      //   window.VoirAnimeContact.close()
      window.VoirAnimeContact = {
        open:  openModal,
        close: closeModal
      };

    })();
  </script>
</body>
</html>
