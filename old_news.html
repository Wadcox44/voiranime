<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoirAnime — News</title>

  <link rel="stylesheet" href="style.css"/>

  <style>
    .hidden{display:none}
    .news-loading{padding:20px;text-align:center;opacity:.7}
    .news-empty{padding:20px;text-align:center;opacity:.7}
    .news-article-card{display:flex;gap:12px;padding:10px;border-bottom:1px solid rgba(255,255,255,.08);text-decoration:none;color:white}
    .news-article-img{width:80px;height:80px;object-fit:cover;border-radius:8px}
    .news-article-img-placeholder{background:#222}
    .news-article-title{font-weight:600;margin-bottom:4px}
    .news-article-excerpt{font-size:.85rem;opacity:.7}
    .news-article-date{font-size:.75rem;opacity:.5;margin-top:4px}
    .news-tabs{display:flex;gap:10px;padding:10px}
    .news-tab{cursor:pointer;padding:6px 12px;border-radius:20px;background:#222}
    .news-tab.active{background:#444}
    .news-panel{padding:10px}
    .news-source-tag{cursor:pointer;margin-right:10px;opacity:.6}
    .news-source-tag.active{opacity:1;font-weight:bold}
  </style>
</head>

<body>

<!-- HEADER SIMPLE -->
<div class="news-header">
  <h1>📰 News anime</h1>
</div>

<!-- TABS -->
<div class="news-tabs">
  <div class="news-tab active" data-tab="global">🌍 Actu globale</div>
  <div class="news-tab" data-tab="perso">⭐ Mes alertes</div>
</div>

<!-- GLOBAL -->
<div class="news-panel" id="newsTabGlobal">

  <div class="news-sources-bar">
    <span class="news-source-tag active" data-source="all">Tous</span>
    <span class="news-source-tag" data-source="crunchyroll">Crunchyroll</span>
    <span class="news-source-tag" data-source="animenewsnetwork">ANN</span>
    <span class="news-source-tag" data-source="otakunews">Otaku</span>
  </div>

  <div id="newsFeedGlobal" class="news-feed">
    <div class="news-loading">Chargement...</div>
  </div>
</div>

<!-- PERSO -->
<div class="news-panel hidden" id="newsTabPerso">
  <div id="newsFavAlerts"></div>
</div>

<script>
(function() {

  // ─────────────── TABS ───────────────
  var tabs = document.querySelectorAll('.news-tab');
  var panels = document.querySelectorAll('.news-panel');

  tabs.forEach(tab => {
    tab.addEventListener('click', function() {

      tabs.forEach(t => t.classList.remove('active'));
      panels.forEach(p => p.classList.add('hidden'));

      tab.classList.add('active');

      var target = tab.dataset.tab;
      document.getElementById('newsTab' + target.charAt(0).toUpperCase() + target.slice(1))
        .classList.remove('hidden');

      if (target === 'perso') loadPersoNews();
    });
  });

  var currentSource = 'all';

  // ─────────────── NEWS GLOBAL ───────────────
  function loadGlobalNews(source) {
    var feed = document.getElementById('newsFeedGlobal');

    feed.innerHTML = '<div class="news-loading">Chargement...</div>';

    var RSS = {
      all: 'https://myanimelist.net/rss/news.xml',
      crunchyroll: 'https://www.nautiljon.com/actualite/rss.php',
      animenewsnetwork: 'https://www.animenewsnetwork.com/news/rss.xml',
      otakunews: 'https://www.otakuusamagazine.com/feed/'
    };

    var url = RSS[source] || RSS.all;
    var api = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(url);

    fetch(api)
      .then(r => r.json())
      .then(data => {

        var items = data.items || [];

        if (!items.length) {
          feed.innerHTML = '<div class="news-empty">Aucune news</div>';
          return;
        }

        var html = '';

        items.forEach(a => {

          var img = a.thumbnail || '';
          if (!img && a.description) {
            var m = a.description.match(/src=["']([^"']+)["']/);
            if (m) img = m[1];
          }

          var text = (a.description || '')
            .replace(/(<([^>]+)>)/gi,'')
            .slice(0,120);

          html += `
            <a class="news-article-card" href="${a.link}" target="_blank">
              ${img
                ? `<img class="news-article-img" src="${img}"/>`
                : `<div class="news-article-img news-article-img-placeholder"></div>`}

              <div>
                <div class="news-article-title">${a.title}</div>
                <div class="news-article-excerpt">${text}</div>
              </div>
            </a>
          `;
        });

        feed.innerHTML = html;
      })
      .catch(err => {
        console.error(err);
        feed.innerHTML =
          '<div class="news-empty">Erreur chargement<br><button onclick="loadGlobalNews(\''+source+'\')">Retry</button></div>';
      });
  }

  window.loadGlobalNews = loadGlobalNews;

  // ─────────────── FILTERS ───────────────
  document.querySelectorAll('.news-source-tag').forEach(tag => {
    tag.addEventListener('click', function() {
      document.querySelectorAll('.news-source-tag').forEach(t => t.classList.remove('active'));
      tag.classList.add('active');

      currentSource = tag.dataset.source;
      loadGlobalNews(currentSource);
    });
  });

  // ─────────────── PERSO ───────────────
  function loadPersoNews() {
    var el = document.getElementById('newsFavAlerts');
    var favs = [];

    try {
      favs = JSON.parse(localStorage.getItem('VoirAnime_favs') || '[]');
    } catch {}

    if (!favs.length) {
      el.innerHTML = '<div class="news-empty">Aucun favori</div>';
      return;
    }

    el.innerHTML = favs.map(f => `
      <div>
        🔔 ${f.title}
      </div>
    `).join('');
  }

  // ─────────────── INIT ───────────────
  loadGlobalNews('all');

})();
</script>

</body>
</html>
