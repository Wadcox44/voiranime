<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VoirAnime — News</title>
<link rel="stylesheet" href="style.css"/>
<style>
.hidden { display: none }

/* NEWS */
.news-page-wrap {
  max-width: 860px;
  margin: 0 auto;
  padding: calc(var(--nav-h) + 20px) 16px 40px;
}

.news-tabs {
  display: flex;
  gap: 10px;
  padding: 0 0 16px;
  flex-wrap: wrap;
}

.news-tab {
  padding: 7px 16px;
  border-radius: 20px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
  font-size: .9rem;
  color: var(--text);
  transition: background .2s;
}
.news-tab.active,
.news-tab:hover {
  background: rgba(167,139,250,0.18);
  border-color: rgba(167,139,250,0.4);
  color: #fff;
}

.news-panel { padding: 0; }

.news-loading,
.news-empty {
  text-align: center;
  padding: 40px 20px;
  opacity: .6;
}

.news-article-card {
  display: flex;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid rgba(255,255,255,.07);
  text-decoration: none;
  color: var(--text);
  transition: opacity .2s;
}
.news-article-card:hover { opacity: .8; }

.news-article-img {
  width: 84px;
  height: 84px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
}
.news-article-img-placeholder {
  width: 84px;
  height: 84px;
  border-radius: 10px;
  background: rgba(255,255,255,.06);
  flex-shrink: 0;
}

.news-article-title {
  font-weight: 600;
  font-size: .95rem;
  margin-bottom: 6px;
  line-height: 1.35;
}
.news-article-excerpt {
  font-size: .82rem;
  opacity: .6;
  line-height: 1.45;
}
</style>
</head>

<body>

<!-- ════ NAVBAR ════ -->
<nav class="navbar" id="navbar">
  <div class="nav-top">
    <div class="nav-left">
      <div class="nav-logo-wrap">
        <a href="index.html" class="nav-logo" aria-label="VoirAnime">
          <span class="logo-glitch" data-text="VoirAnime">
            <span class="logo-voir">Voir</span><span class="logo-anime">Anime</span>
          </span>
        </a>
        <span class="logo-tagline" data-i18n="nav.tagline">Découvre autrement.</span>
      </div>
    </div>
    <a href="profile.html" class="nav-avatar-btn nav-avatar-left" id="navAvatarBtn" title="Mon profil">
      <img class="nav-avatar-img" id="navAvatarImg" src="" alt="Profil"
           onerror="this.style.display='none';document.getElementById('navAvatarFallback_news').style.display='flex'"/>
      <div class="nav-avatar-fallback" id="navAvatarFallback_news">👤</div>
    </a>
    <div class="nav-right">
      <div class="search-container" id="searchContainer">
        <button class="search-toggle" id="searchToggle" aria-label="Rechercher">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span class="search-toggle-label" data-i18n="nav.search">Recherche</span>
        </button>
        <div class="search-expand" id="searchExpand">
          <input type="text" id="searchInput" placeholder="Titre, genre, personnage…" autocomplete="off" spellcheck="false"/>
          <button class="search-clear" id="searchClear">✕</button>
        </div>
      </div>
    </div>
  </div>
  <ul class="nav-links">
    <li><a href="index.html"     class="nav-link" data-i18n="nav.home">Accueil</a></li>
    <li><a href="catalogue.html" class="nav-link" data-i18n="nav.catalogue">Catalogue</a></li>
    <li><a href="duel.html"      class="nav-link" data-i18n="nav.duels">⚔ Duels</a></li>
    <li><a href="news.html"      class="nav-link active">📰 News</a></li>
    <li><a href="soutenir.html"  class="nav-link nav-link-support" data-i18n="nav.support">💜 Faire un don</a></li>
  </ul>
</nav>

<!-- ════ SEARCH OVERLAY ════ -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-overlay-inner">
    <div class="search-overlay-header">
      <p class="search-overlay-label" id="searchLabel" data-i18n="search.results">Résultats de recherche</p>
      <button class="search-overlay-close" id="searchOverlayClose" data-i18n="search.close">✕ Fermer</button>
    </div>
    <div class="search-results-grid" id="searchResultsGrid"></div>
    <div class="search-loader" id="searchLoader">
      <div class="sk-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="search-empty" id="searchEmpty">
      <p class="empty-kaomoji">（；￣д￣）</p>
      <p data-i18n="search.empty">Aucun résultat. Essaie un autre titre.</p>
    </div>
  </div>
</div>

<!-- Toast notifications -->
<div class="toast" id="toast"></div>

<!-- ════ CONTENU NEWS ════ -->
<div class="news-page-wrap">

  <div class="news-tabs">
    <div class="news-tab active" data-tab="Global">🌍 Actu globale</div>
    <div class="news-tab"        data-tab="Perso">⭐ Mes alertes</div>
  </div>

  <div class="news-panel" id="newsTabGlobal">
    <div id="newsFeedGlobal">
      <div class="news-loading">Chargement…</div>
    </div>
  </div>

  <div class="news-panel hidden" id="newsTabPerso">
    <div id="newsFavAlerts"></div>
  </div>

</div>

<script type="module" src="main.js"></script>
<script>
(function () {

  const RSS = {
    all:              'https://myanimelist.net/rss/news.xml',
    crunchyroll:      'https://www.nautiljon.com/actualite/rss.php',
    animenewsnetwork: 'https://www.animenewsnetwork.com/news/rss.xml',
    otakunews:        'https://www.otakuusamagazine.com/feed/'
  };

  function loadGlobalNews(source) {
    const feed = document.getElementById('newsFeedGlobal');
    feed.innerHTML = "<div class='news-loading'>Chargement…</div>";

    const url = 'https://api.rss2json.com/v1/api.json?rss_url=' +
      encodeURIComponent(RSS[source] || RSS.all);

    fetch(url)
      .then(r => r.json())
      .then(data => {
        const items = data.items || [];
        if (!items.length) {
          feed.innerHTML = "<div class='news-empty'>Aucune news disponible.</div>";
          return;
        }

        let html = '';
        items.forEach(a => {
          let img = a.thumbnail || '';
          if (!img && a.enclosure && a.enclosure.link)               img = a.enclosure.link;
          if (!img && a['media:content'] && a['media:content'].url)  img = a['media:content'].url;
          if (!img && a.description) {
            const m = a.description.match(/src=['"]([^'"]+)['"]/);
            if (m) img = m[1];
          }
          const text = (a.description || '').replace(/(<([^>]+)>)/gi, '').slice(0, 120);

          html += `
            <a class="news-article-card" href="${a.link}" target="_blank" rel="noopener">
              ${img
                ? `<img class="news-article-img" src="${img}" alt="" loading="lazy"/>`
                : `<div class="news-article-img-placeholder"></div>`}
              <div>
                <div class="news-article-title">${a.title}</div>
                <div class="news-article-excerpt">${text}</div>
              </div>
            </a>`;
        });
        feed.innerHTML = html;
      })
      .catch(() => {
        feed.innerHTML = "<div class='news-empty'>Erreur lors du chargement des news.</div>";
      });
  }

  // Tabs
  document.querySelectorAll('.news-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.news-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.news-panel').forEach(p => p.classList.add('hidden'));
      tab.classList.add('active');
      document.getElementById('newsTab' + tab.dataset.tab).classList.remove('hidden');
    });
  });

  // Init
  loadGlobalNews('all');

})();
</script>

</body>
</html>
