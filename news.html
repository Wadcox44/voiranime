<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoirAnime — News</title>

  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">

  <script src="i18n.js"></script>
  <script src="featuresManager.js"></script>
  <script src="premiumManager.js"></script>

  <style>
    /* ===== NAVBAR IDENTIQUE catalogue ===== */
    .nav-logo{text-decoration:none;display:inline-flex;align-items:center}
    .logo-glitch{display:inline-block;font-family:'Outfit',sans-serif;font-size:1.45rem;font-weight:900;letter-spacing:-.5px;transform:skewX(-6deg);position:relative;user-select:none}
    .logo-glitch::before,.logo-glitch::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;pointer-events:none}
    .logo-glitch::before{color:#22d3ee;clip-path:polygon(0 15%,100% 15%,100% 45%,0 45%);animation:va-gr-auto 5s steps(2) infinite;opacity:1}
    .logo-glitch::after{color:#a78bfa;clip-path:polygon(0 55%,100% 55%,100% 85%,0 85%);animation:va-gb-auto 5s steps(2) .06s infinite;opacity:1}

    @keyframes va-gr-auto{
      0%{transform:translate(-2px,1px);opacity:1}
      8%{transform:translate(1px,-2px);opacity:1}
      8.1%,100%{transform:translate(0,0);opacity:0}
    }
    @keyframes va-gb-auto{
      0%{transform:translate(2px,-1px);opacity:1}
      8%{transform:translate(-2px,1px);opacity:1}
      8.1%,100%{transform:translate(0,0);opacity:0}
    }

    .logo-voir{color:#fff}
    .logo-anime{color:#22d3ee}

    /* ===== PAGE NEWS ===== */
    .news-container{
      max-width:1100px;
      margin:0 auto;
      padding:120px 20px 40px;
    }

    .news-title{
      font-size:2.2rem;
      font-weight:900;
      margin-bottom:10px;
    }

    .news-sub{
      color:#aaa;
      margin-bottom:30px;
    }

    .news-card{
      background:#14131f;
      border:1px solid #222;
      border-radius:12px;
      padding:16px;
      margin-bottom:12px;
    }
  </style>
</head>

<body>

<!-- NAVBAR (copiée catalogue.html) -->
<nav class="navbar scrolled" id="navbar">
  <div class="nav-top">
    <div class="nav-left">
      <div class="nav-logo-wrap">
        <a href="index.html" class="nav-logo">
          <span class="logo-glitch" data-text="VoirAnime">
            <span class="logo-voir">Voir</span><span class="logo-anime">Anime</span>
          </span>
        </a>
        <span class="logo-tagline">Découvre autrement.</span>
      </div>
    </div>

    <a href="profile.html" class="nav-avatar-btn nav-avatar-left">
      <img class="nav-avatar-img" id="navAvatarImg" src="" alt="Profil"
           onerror="this.style.display='none'"/>
      <div class="nav-avatar-fallback">👤</div>
    </a>
  </div>

  <ul class="nav-links">
    <li><a href="index.html" class="nav-link">Accueil</a></li>
    <li><a href="catalogue.html" class="nav-link">Catalogue</a></li>
    <li><a href="duel.html" class="nav-link">⚔ Duels</a></li>
    <li><a href="news.html" class="nav-link">📰 News</a></li>
    <li><a href="soutenir.html" class="nav-link nav-link-support">💜 Faire un don</a></li>
  </ul>
</nav>

<!-- CONTENU NEWS -->
<div class="news-container">
  <h1 class="news-title">📰 News Anime</h1>
  <p class="news-sub">Dernières actualités du monde de l’animation</p>

  <div class="news-card">Chargement des news...</div>
</div>

<script>
/* Active link menu */
document.addEventListener('DOMContentLoaded', function(){
  const page = location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.nav-link').forEach(l=>{
    l.classList.toggle('active', l.getAttribute('href') === page);
  });
});
</script>

</body>
</html>
