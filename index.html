<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoirAnime</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">VoirAnime</div>

    <input 
      type="text" 
      id="searchInput"
      placeholder="Trouve ton prochain anime..."
    />
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>Découvre ton prochain anime</h1>
    <p>Recherche instantanée • Recommandations • Anime Library</p>
  </section>

  <!-- MOOD SELECTOR -->
  <section class="moods">
    <button>⚔️ Action</button>
    <button>💕 Romance</button>
    <button>🧠 Mindblown</button>
    <button>😂 Comedy</button>
    <button>🌑 Dark</button>
  </section>

  <!-- TRENDING -->
  <section class="section">
    <h2>🔥 Tendances</h2>
    <div id="trending" class="grid"></div>
  </section>

  <!-- RESULTS -->
  <section class="section">
    <h2>🔎 Résultats</h2>
    <div id="results" class="grid"></div>
  </section>

  <footer>
    <p>VoirAnime • Anime discovery engine</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
